<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desirée Honoré | Clients</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ─── Clients Page ─── */
    .clients-hero {
      padding: 8rem 1.5rem 3rem;
      text-align: center;
    }
    .clients-hero h1 {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      color: #171717;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .clients-hero p {
      color: #737373;
      font-size: 1rem;
      max-width: 38rem;
      margin: 0 auto;
      line-height: 1.7;
    }
    .clients-grid {
      max-width: 72rem;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2rem;
    }
    @media (max-width: 900px) { .clients-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .clients-grid { grid-template-columns: 1fr; } }
    .client-card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      border-radius: 1rem;
      border: 1px solid rgba(229,229,229,0.6);
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: all 0.4s;
      min-height: 160px;
    }
    .client-card:hover {
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      transform: translateY(-4px);
    }
    .client-card img {
      max-width: 120px;
      max-height: 60px;
      object-fit: contain;
      filter: grayscale(100%);
      opacity: 0.7;
      transition: all 0.4s;
    }
    .client-card:hover img {
      filter: grayscale(0%);
      opacity: 1;
    }
    .client-card .client-name {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #a3a3a3;
    }
  </style>
</head>

        <a href="resume.html">Resume</a>
        <a href="index.html#contact" class="nav-cta">Say Hello</a>

    <div class="mobile-menu" id="mobile-menu">

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
  // Nav scroll effect
  window.addEventListener('scroll', function() {
    document.getElementById('main-nav').classList.toggle('scrolled', window.scrollY > 50);
  });
  // Mobile menu toggle
  var menuOpen = false;
  document.getElementById('menu-toggle').addEventListener('click', function() {
    menuOpen = !menuOpen;
    document.getElementById('mobile-menu').classList.toggle('open', menuOpen);
  });
  document.querySelectorAll('#mobile-menu a').forEach(function(a) {
    a.addEventListener('click', function() {
      menuOpen = false;
      document.getElementById('mobile-menu').classList.remove('open');
    });
  });
</script>
